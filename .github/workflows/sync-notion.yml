name: Sync Notion to JSO

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: 18

      - run: npm install @notionhq/client

      - run: node scripts/syncNotion.js
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_EBOOK_DATABASE_ID: ${{ secrets.NOTION_EBOOK_DATABASE_ID }}

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/ebooks.json
          git commit -m "Update ebooks"
          git push
